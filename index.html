<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rashidam & Hasan Soner</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        /* 1. Kilit nokta: Body'i sabitlemiyoruz, sayfa akışına izin veriyoruz */
        html, body { 
            width: 100%; 
            min-height: 100%; 
            background: #fbf8f2; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        /* 2. Zarf Ekranı: Sabit kalmalı */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: #000 url("zarf-on.png.PNG") center center/cover no-repeat;
            transition: opacity 0.8s ease;
        }

        /* 3. İç Kart: Sayfa akışında olmalı (Absolute değil, block) */
        #card-screen {
            display: none; 
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #card-screen.show { display: block; opacity: 1; }

        /* Resimlerin düzgün görünmesi */
        .invitation-image {
            display: block;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            height: auto;
        }

        #seal-hitbox {
            position: absolute;
            left: 50%; top: 53%;
            width: 150px; height: 150px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 100;
        }

        .open-anim { animation: fadeOut 1.5s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-100%); } }
    </style>
</head>
<body>

    <audio id="music" src="./Por uno .mp3" preload="auto"></audio>

    <div id="envelope-screen">
        <div id="seal-hitbox"></div>
    </div>

    <!-- Davetiye içeriği -->
    <div id="card-screen">
        <div class="invitation-top">
            <img src="./davetiye-ic.png.PNG" class="invitation-image" alt="Davetiye">
        </div>
        <!-- Bilgileriniz burada aşağıya doğru uzayacak -->
    </div>

    <script>
        const seal = document.getElementById("seal-hitbox");
        const env = document.getElementById("envelope-screen");
        const card = document.getElementById("card-screen");
        const music = document.getElementById("music");

        seal.addEventListener("click", () => {
            music.play().catch(e => console.log(e));
            
            // Zarfı animasyonla gönder
            env.classList.add("open-anim");
            
            // 1.5 saniye sonra zarfı tamamen kaldır ve kartı göster
            setTimeout(() => {
                env.style.display = "none";
                card.style.display = "block";
                card.classList.add("show");
            }, 1500);
        });
    </script>
</body>
</html>
