<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Rashidam & Hasan Soner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;
overflow:hidden;

font-family:'Montserrat',sans-serif;

background:#000;

}

body{

position:relative;

}

/*=============================
MÜZİK
=============================*/

audio{

display:none;

}

/*=============================
GENEL EKRANLAR
=============================*/

.screen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

}

/*=============================
ÖN ZARF
=============================*/

#envelope-screen{

z-index:9999;

background:

url("zarf-on.png.PNG")

center center/

cover

no-repeat;

}

/*=============================
İÇ DAVETİYE
=============================*/

#card-screen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#f8f5ef;

opacity:0;
visibility:hidden;

overflow-y:auto;

-webkit-overflow-scrolling:touch;

z-index:1;

transition:opacity .8s ease;

}
/*=============================
DAVETİYE GÖRSELİ
=============================*/

.invitation-top{

position:relative;

width:100%;

max-width:700px;

margin:auto;

}

.invitation-image{

display:block;

width:100%;

height:auto;

}

/*=============================
BİLGİLER
=============================*/

.info-area{

width:100%;

max-width:700px;

margin:auto;

padding:40px 24px 80px;

background:#faf7f2;

}
/*==================================
MÜHÜR TIKLAMA ALANI
==================================*/

#seal-hitbox{

position:absolute;

left:50%;
top:53%;

width:150px;
height:150px;

transform:translate(-50%,-50%);

cursor:pointer;

z-index:100;

border-radius:50%;

background:transparent;

}

/*==================================
ZARF AÇILIŞI
==================================*/

#envelope-screen.open{

animation:

openEnvelope 1.8s ease forwards;

}

@keyframes openEnvelope{

0%{

transform:
scale(1);

opacity:1;

}

35%{

transform:
scale(1.02);

}

100%{

transform:
translateY(-100%);

opacity:0;

}

}
    
#envelope-screen.open{

pointer-events:none;

visibility:hidden;

}

/*==================================
DAVETİYE
==================================*/

#card-screen.show{

opacity:1;

visibility:visible;

animation:cardUp 1.4s ease;

}

@keyframes cardUp{

0%{

opacity:0;

transform:
translateY(120px);

}

100%{

opacity:1;

transform:
translateY(0);

}

}
    
</style>

</head>

<body>

<audio
id="music"
preload="auto">

<source
src="Por uno .mp3"
type="audio/mpeg">

</audio>

<div
id="envelope-screen"
class="screen">

    <div id="seal-hitbox"></div>

</div>

<div
id="card-screen"
class="screen">

<div
class="invitation-top">

<img src="zarf-on.png.PNG" class="invitation-image" alt="Test">
</div>

<div
class="info-area">

<!-- Tarih -->

<!-- Sayaç -->

<!-- Salon -->

<!-- Adres -->

<!-- Haritada Aç -->

<!-- Takvime Ekle -->

</div>

</div>
<script>

const seal = document.getElementById("seal-hitbox");
const envelope = document.getElementById("envelope-screen");
const card = document.getElementById("card-screen");
const music = document.getElementById("music");

let opened = false;

seal.addEventListener("click", function () {

    if (opened) return;

    opened = true;

    music.play().catch(() => {});

    envelope.classList.add("open");

    setTimeout(function () {

        card.classList.add("show");

    }, 1500);

});

</script>

</body>

</html>
