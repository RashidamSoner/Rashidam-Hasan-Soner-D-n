<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashidam & Hasan Soner Düğün Davetiyesi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f4ebd0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 1. KATMAN: YÜKLEDİĞİNİZ SİYAH ZARF GÖRSELİ */
        #envelope-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212 url('zarf.png.jpg') center center / cover no-repeat;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.2s;
        }
        #envelope-layer.open {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* Orijinal Mühür Üzerine Denk Gelecek Görünmez/Şeffaf Tıklama Alanı */
        .invisible-seal-btn {
            position: absolute;
            width: 150px;
            height: 150px;
            bottom: 12%; /* Ekrandaki mühürün yüksekliğine göre ayarlandı */
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Hafifçe yanıp sönen mühre dokun yönlendirmesi */
        .seal-hint-text {
            position: absolute;
            bottom: 6%;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-align: center;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            animation: pulseText 1.5s infinite;
        }

        /* 2. KATMAN: YÜKLEDİĞİNİZ İÇ SAYFA GÖRSELİ DÜZENİ */
        .invitation-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            /* Yüklediğiniz uzun davetiye görselini arka plan yapıyoruz */
            background: #fdfbf7 url('davetiye-arka-plan.png.jpg') top center / 100% auto no-repeat;
            min-height: 2020px; /* Görselin dikey uzunluğuna göre yaklaşık alan */
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
        }

        /* GERİ SAYIM SAYACI (Resimdeki çemberlerin tam üzerine oturacak şekilde) */
        .countdown-overlay {
            position: absolute;
            top: 760px; /* Resimdeki geri sayım yuvarlaklarının olduğu yaklaşık yükseklik */
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 18px; /* Yuvarlakların hizasına göre ayar */
            padding: 0 10px;
        }
        .time-box {
            width: 68px;
            height: 68px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .time-num {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #61502f;
            line-height: 1;
        }
        .time-label {
            font-size: 0.55rem;
            font-family: sans-serif;
            letter-spacing: 1px;
            color: #9c8863;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* HARİTAYA GİT BUTONU (Resimdeki butonun tam üzerine gelecek şekilde şeffaf buton) */
        .maps-overlay-btn {
            position: absolute;
            top: 1590px; /* Resimdeki "HARİTADA GÖSTER" butonunun olduğu yükseklik */
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 45px;
            display: block;
            text-decoration: none;
            background: transparent; /* Resimdeki buton göründüğü için şeffaf bırakıyoruz */
            cursor: pointer;
            border-radius: 4px;
        }

        @keyframes pulseText {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN MÜZİĞİ -->
    <audio id="wedding-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <!-- 1. GÖRSEL: INTERAKTİF SİYAH ZARF -->
    <div id="envelope-layer">
        <!-- Resimdeki mühür alanına denk gelen şeffaf tıklama bölgesi -->
        <div class="invisible-seal-btn" onclick="openEnvelope()"></div>
        <div class="seal-hint-text">MÜHRE DOKUNUNUZ</div>
    </div>

    <!-- 2. GÖRSEL: BİREBİR İÇ SAYFA VE DİNAMİK ALANLAR -->
    <div class="invitation-container">
        
        <!-- Dinamik Sayaç (Arka plandaki yuvarlak halkaların tam içine yerleşir) -->
        <div class="countdown-overlay">
            <div class="time-box"><div class="time-num" id="days">00</div><div class="time-label">Gün</div></div>
            <div class="time-box"><div class="time-num" id="hours">00</div><div class="time-label">Saat</div></div>
            <div class="time-box"><div class="time-num" id="minutes">00</div><div class="time-label">Dk</div></div>
            <div class="time-box"><div class="time-num" id="seconds">00</div><div class="time-label">Sn</div></div>
        </div>

        <!-- Gerçek Google Haritalar Bağlantısı (Resimdeki butonun üzerine biner) -->
        <a href="https://maps.app.goo.gl/r5z7d3Yv4zG5N6vK7" target="_blank" class="maps-overlay-btn" title="Yol Tarifi Al"></a>

    </div>

    <script>
        // Zarfı Açma Fonksiyonu
        function openEnvelope() {
            const envelope = document.getElementById('envelope-layer');
            const music = document.getElementById('wedding-music');
            
            envelope.classList.add('open');
            // Müziği başlat
            music.play().catch(err => console.log("Müzik için kullanıcı etkileşimi bekleniyor."));
        }

        // Dinamik Geri Sayım Sayacı (21 Ağustos 2026 için)
        const targetDate = new Date("August 21, 2026 19:00:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            if (difference < 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);
    </script>
</body>
</html>
