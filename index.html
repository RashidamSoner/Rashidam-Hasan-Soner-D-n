<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashidam & Hasan Soner</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        /* Dış katmanı her zaman tam ekran yapıyoruz */
        html, body { width: 100%; min-height: 100%; background: #000; }

        /* ZARF EKRANI */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999;
            background: url("zarf.png") center/cover no-repeat;
            transition: opacity 1s ease;
        }

        /* İÇ KART EKRANI - Burası artık sabit durmuyor, içeriğiyle uzuyor */
        #card-screen {
            display: none; /* İlk başta gizli */
            width: 100%;
            background: #f8f5ef;
            min-height: 100vh;
        }

        /* RESİM AYARI - Genişliği %100 yapıyoruz, yükseklik otomatik (auto) kalsın ki resim uzadıkça sayfa uzasın */
        .invitation-image {
            display: block;
            width: 100%;
            height: auto; /* ÖNEMLİ: Resim kendi orijinal boy oranını korur ve sayfayı aşağı uzatır */
        }

        #seal-hitbox {
            position: absolute;
            left: 50%; top: 55%;
            width: 150px; height: 150px;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="music" src="muzik.mp3" preload="auto"></audio>

    <div id="envelope-screen">
        <div id="seal-hitbox"></div>
    </div>

    <!-- Davetiye açılınca burası görünecek -->
    <div id="card-screen">
        <img src="davetiye.png" class="invitation-image" alt="Davetiye">
    </div>

    <script>
        const seal = document.getElementById("seal-hitbox");
        const env = document.getElementById("envelope-screen");
        const card = document.getElementById("card-screen");
        const music = document.getElementById("music");

        seal.addEventListener("click", () => {
            music.play();
            env.classList.add("hidden");
            // Zarf kaybolduktan sonra iç kartı göster
            setTimeout(() => {
                env.style.display = "none";
                card.style.display = "block";
            }, 1000);
        });
    </script>
</body>
</html>
