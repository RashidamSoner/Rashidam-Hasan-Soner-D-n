<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashidam & Hasan Soner Düğün Davetiyesi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f7f4ed;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        /* 1. ZARF KATMANI (TAM EKRAN RESİM) */
        #envelope-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1s ease;
        }
        #envelope-layer.open {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        .envelope-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Resmi kesmeden ekrana tam sığdırır */
            max-width: 500px;
        }
        /* Resimdeki mühürün üzerine gelen tıklama alanı */
        .seal-click-area {
            position: absolute;
            width: 120px;
            height: 120px;
            bottom: 22%; /* Zarf resmindeki mühürün yerine göre hizalandı */
            cursor: pointer;
            border-radius: 50%;
            -webkit-tap-highlight-color: transparent;
        }
        .hint-text {
            position: absolute;
            bottom: 15%;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        /* 2. İÇ SAYFA KATMANI */
        .main-content {
            width: 100%;
            max-width: 500px;
            background-color: #fdfbf7;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        .invitation-main-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* CANLI GERİ SAYIM ALANI (Resmin hemen altında temiz düzen) */
        .countdown-wrapper {
            background-color: #faf6ee;
            padding: 30px 20px;
            border-top: 1px solid #ebdcb9;
            border-bottom: 1px solid #ebdcb9;
        }
        .countdown-title {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #8a7343;
            margin-bottom: 15px;
        }
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .time-box {
            background: #fff;
            border: 1px solid #ebdcb9;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .time-num {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #61502f;
        }
        .time-label {
            font-size: 0.55rem;
            letter-spacing: 1px;
            color: #9c8863;
            text-transform: uppercase;
        }

        /* HARİTA BUTONU */
        .maps-container {
            padding: 30px 20px 40px 20px;
            background-color: #fdfbf7;
        }
        .maps-btn {
            display: inline-block;
            background-color: #8a7343;
            color: #fff;
            text-decoration: none;
            padding: 14px 35px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-radius: 4px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(138, 115, 67, 0.3);
            transition: background 0.3s;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN MÜZİĞİ -->
    <audio id="wedding-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <!-- ZARF GÖRSELİ -->
    <div id="envelope-layer">
        <img src="zarf.png.jpg" class="envelope-img" alt="Zarf">
        <div class="seal-click-area" onclick="openEnvelope()"></div>
        <div class="hint-text">MÜHRE DOKUNUNUZ</div>
    </div>

    <!-- İÇ DAVETİYE GÖRSELİ VE SAYAÇ -->
    <div class="main-content">
        <!-- Yüklediğiniz harika iç sayfa resmi orijinal haliyle üstte durur -->
        <img src="davetiye-arka-plan.png.jpg" class="invitation-main-img" alt="Davetiye">
        
        <!-- Geri Sayım Sayacı Tam Resmin Altında Net Şekilde Başlar -->
        <div class="countdown-wrapper">
            <div class="countdown-title">✦ DÜĞÜNÜMÜZE KALAN SÜRE ✦</div>
            <div class="countdown-container">
                <div class="time-box"><div class="time-num" id="days">00</div><div class="time-label">Gün</div></div>
                <div class="time-box"><div class="time-num" id="hours">00</div><div class="time-label">Saat</div></div>
                <div class="time-box"><div class="time-num" id="minutes">00</div><div class="time-label">Dk</div></div>
                <div class="time-box"><div class="time-num" id="seconds">00</div><div class="time-label">Sn</div></div>
            </div>
        </div>

        <!-- Harita Butonu En Altta -->
        <div class="maps-container">
            <a href="https://maps.app.goo.gl/r5z7d3Yv4zG5N6vK7" target="_blank" class="maps-btn">YOL TARİFİ VE KONUM</a>
        </div>
    </div>

    <script>
        function openEnvelope() {
            document.getElementById('envelope-layer').classList.add('open');
            const music = document.getElementById('wedding-music');
            music.play().catch(err => console.log("Müzik otomatik başlatılamadı."));
        }

        // Geri Sayım (21 Ağustos 2026 için)
        const targetDate = new Date("August 21, 2026 19:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }, 1000);
    </script>
</body>
</html>
